databases:
  - name: f1-analytics-db
    plan: free
    databaseName: f1_analytics
    region: oregon

services:
  - type: web
    name: f1-analytics-api
    runtime: python
    plan: free
    region: oregon
    branch: main
    buildCommand: "pip install -r requirements/backend.txt -r requirements/etl.txt"
    startCommand: "alembic -c database/alembic.ini upgrade head && (python etl.py || echo 'ETL failed, continuing with existing data') && exec uvicorn backend.main:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /api/v1/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: f1-analytics-db
          property: connectionString
      - key: PYTHONPATH
        value: "."
      - key: DEFAULT_SEASON
        value: "2026"
      - key: LOG_LEVEL
        value: INFO
      - key: OPENF1_API_KEY
        value: ""
      - key: API_SPORTS_KEY
        value: ""
